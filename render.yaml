services:
  - type: web
    name: persi-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    buildContext: backend/
    repo: https://github.com/nagarmohnish/persi
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://persi-frontend.onrender.com
      - key: DEBUG
        value: "false"

  - type: web
    name: persi-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    buildContext: frontend/
    repo: https://github.com/nagarmohnish/persi
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://persi-backend.onrender.com
